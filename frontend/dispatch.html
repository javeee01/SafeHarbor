<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch | SafeHarbor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="dashboard.html"><span class="brand-mark">S</span> SafeHarbor</a>
    <nav class="nav">
      <a data-nav="dashboard" href="dashboard.html">Dashboard</a>
      <a data-nav="incidents" href="incident.html">Incidents</a>
      <a data-nav="inventory" href="inventory.html">Inventory</a>
      <a data-nav="shelters" href="shelters.html">Shelters</a>
      <a data-nav="dispatch" href="dispatch.html">Dispatch</a>
      <a data-nav="admin" href="admin.html">Admin</a>
      <button data-logout type="button">Logout</button>
    </nav>
  </header>
  <main class="container">
    <section class="page-head"><div><h1>Dispatch</h1><p>Send inventory resources to active incidents and track delivery status.</p></div></section>
    <section class="grid">
      <section class="panel span-5">
        <h2>Dispatch request</h2>
        <form id="dispatchForm">
          <input type="hidden" name="id">
          <label>Target incident <select name="targetIncidentId" id="incidentSelect" required></select></label>
          <label>Inventory item <select name="inventoryItemId" id="inventorySelect" required></select></label>
          <label>Dispatched quantity <input name="dispatchedQuantity" type="number" min="1" required></label>
          <div class="button-row"><button type="submit">Save dispatch</button><button id="resetDispatch" class="secondary" type="button">Clear</button></div>
        </form>
        <p id="dispatchStatus" class="status"></p>
      </section>
      <section class="panel span-7">
        <div class="toolbar"><h2>Dispatch records</h2><button id="refreshDispatches" class="secondary" type="button">Refresh</button></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Incident</th><th>Item</th><th>Quantity</th><th>Status</th><th>Started</th><th>Actions</th></tr></thead>
            <tbody id="dispatchRows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/DishPatch.js"></script>
</body>
</html>
