<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidents | SafeHarbor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="dashboard.html"><span class="brand-mark">S</span> SafeHarbor</a>
    <nav class="nav">
      <a data-nav="dashboard" href="dashboard.html">Dashboard</a>
      <a data-nav="incidents" href="incident.html">Incidents</a>
      <a data-nav="inventory" href="inventory.html">Inventory</a>
      <a data-nav="shelters" href="shelters.html">Shelters</a>
      <a data-nav="dispatch" href="dispatch.html">Dispatch</a>
      <a data-nav="admin" href="admin.html">Admin</a>
      <button data-logout type="button">Logout</button>
    </nav>
  </header>
  <main class="container">
    <section class="page-head">
      <div><h1>Incidents</h1><p>Create, update, assign, and close disaster incident records.</p></div>
    </section>
    <section class="grid">
      <section class="panel span-5">
        <h2>Incident form</h2>
        <form id="incidentForm">
          <input type="hidden" name="id">
          <label>Title <input name="title" required></label>
          <label>Description <textarea name="description" required></textarea></label>
          <div class="form-grid">
            <label>Incident type <input name="incidentType" required placeholder="Flood, Fire, Medical"></label>
            <label>Severity
              <select name="severityLevel" required>
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="CRITICAL">Critical</option>
              </select>
            </label>
            <label>Latitude <input name="latitude" type="number" step="0.000001" required></label>
            <label>Longitude <input name="longitude" type="number" step="0.000001" required></label>
          </div>
          <div class="button-row">
            <button type="submit">Save incident</button>
            <button id="resetIncident" class="secondary" type="button">Clear</button>
          </div>
        </form>
        <p id="incidentStatus" class="status"></p>
      </section>
      <section class="panel span-7">
        <div class="toolbar"><h2>Incident records</h2><button id="refreshIncidents" class="secondary" type="button">Refresh</button></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Incident</th><th>Severity</th><th>Status</th><th>Location</th><th>Responder</th><th>Actions</th></tr></thead>
            <tbody id="incidentRows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/incident.js"></script>
</body>
</html>
