spring.application.name=SafeHarbor
spring.datasource.url=jdbc:mysql://localhost:3306/safeharbor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
safeharbor.jwt.secret=${SAFEHARBOR_JWT_SECRET:SafeHarborDefaultJwtSecretKeyForHs256SigningChangeMeNow}
safeharbor.jwt.expiration-ms=86400000
