spring.application.name=SafeHarbor
spring.datasource.url=jdbc:h2:mem:safeharbor_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
server.port=${PORT:8080}
safeharbor.jwt.secret=${SAFEHARBOR_JWT_SECRET:SafeHarborDefaultJwtSecretKeyForHs256SigningChangeMeNow}
safeharbor.jwt.expiration-ms=86400000
